version: "3.9"

services:
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "6831:6831/udp"
    networks:
      - apps

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.73.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - ../data/processed/traces:/traces
      - ../data/processed/logs:/logs
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - apps

  # ===================== AcmeAir =====================
  acmeair:
    image: acmeair-monolithic-java-acmeair-monolithic-java:latest
    container_name: acmeair
    user: root
    environment:
      - MONGO_HOST=acmeair-db
      - >-
        JAVA_TOOL_OPTIONS=
        -javaagent:/opt/otel-javaagent.jar
        -Dotel.service.name=acmeair
        -Dotel.exporter.otlp.endpoint=http://otel-collector:4318
        -Dotel.exporter.otlp.protocol=http/protobuf
        -Dotel.traces.exporter=otlp
        -Dotel.logs.exporter=otlp
        -Dotel.metrics.exporter=none
        -Dotel.instrumentation.servlet.enabled=true
        -Dotel.instrumentation.servlet.experimental-span-attributes=true
        -Dotel.instrumentation.jaxrs.enabled=true
        -Dotel.propagators=tracecontext,baggage
        -Dotel.instrumentation.jdbc.enabled=false
    volumes:
      - ./opentelemetry-javaagent.jar:/opt/otel-javaagent.jar:ro
    ports:
      - "8081:9080"
    depends_on:
      - acmeair-db
      - otel-collector
    networks:
      - apps
    mem_limit: 1024m

  acmeair-db:
    container_name: acmeair-db
    image: mongo:5.0
    networks:
      - apps
    volumes:
      - acmeair_db_data:/data/db

  # ===================== DayTrader =====================
  daytrader7:
    image: daytrader7:latest
    container_name: daytrader7
    user: root
    environment:
      - >-
        JAVA_TOOL_OPTIONS=
        -javaagent:/opt/otel-javaagent.jar
        -Dotel.service.name=daytrader7
        -Dotel.exporter.otlp.endpoint=http://otel-collector:4318
        -Dotel.exporter.otlp.protocol=http/protobuf
        -Dotel.traces.exporter=otlp
        -Dotel.logs.exporter=otlp
        -Dotel.metrics.exporter=none
        -Dotel.instrumentation.servlet.enabled=true
        -Dotel.instrumentation.servlet.experimental-span-attributes=true
        -Dotel.instrumentation.jaxrs.enabled=true
        -Dotel.propagators=tracecontext,baggage
        -Dotel.instrumentation.jdbc.enabled=false
        -Dotel.instrumentation.methods.span-kind=SERVER
        -Dotel.instrumentation.methods.include=org.apache.geronimo.daytrader.javaee6.web.TradeAppServlet[*];org.apache.geronimo.daytrader.javaee6.ejb.TradeBean[*];org.apache.geronimo.daytrader.javaee6.entities.OrderDataBean[*]
    volumes:
      - ./opentelemetry-javaagent.jar:/opt/otel-javaagent.jar:ro
    ports:
      - "8082:9082"
    networks:
      - apps
    depends_on:
      - otel-collector

  # ===================== JPetStore =====================
  jpetstore:
    image: jpetstore:latest
    container_name: jpetstore
    user: root
    environment:
      - >-
        JAVA_TOOL_OPTIONS=
        -javaagent:/opt/otel-javaagent.jar
        -Dotel.service.name=jpetstore
        -Dotel.exporter.otlp.endpoint=http://otel-collector:4318
        -Dotel.exporter.otlp.protocol=http/protobuf
        -Dotel.traces.exporter=otlp
        -Dotel.logs.exporter=otlp
        -Dotel.metrics.exporter=none
        -Dotel.instrumentation.servlet.enabled=true
        -Dotel.instrumentation.servlet.experimental-span-attributes=true
        -Dotel.instrumentation.jaxrs.enabled=true
        -Dotel.propagators=tracecontext,baggage
        -Dotel.instrumentation.jdbc.enabled=false
        -Dotel.instrumentation.methods.span-kind=SERVER
        -Dotel.instrumentation.methods.include=org.springframework.samples.jpetstore.domain.logic.PetStoreFacade[getAccount,insertAccount,updateAccount,getUsernameList,getCategoryList,getCategory,getProductListByCategory,searchProductList,getProduct,getItemListByProduct,getItem,isItemInStock,insertOrder,getOrder,getOrdersByUsername];org.springframework.samples.jpetstore.domain.logic.PetStoreImpl[setAccountDao,setCategoryDao,setProductDao,setItemDao,setOrderDao,getAccount,insertAccount,updateAccount,getUsernameList,getCategoryList,getCategory,getProductListByCategory,searchProductList,getProduct,getItemListByProduct,getItem,isItemInStock,insertOrder,getOrder,getOrdersByUsername];org.springframework.samples.jpetstore.web.struts.AddItemToCartAction[execute];org.springframework.samples.jpetstore.web.struts.RemoveItemFromCartAction[execute];org.springframework.samples.jpetstore.web.struts.UpdateCartQuantitiesAction[execute];org.springframework.samples.jpetstore.web.struts.SignonAction[execute];org.springframework.samples.jpetstore.web.struts.NewAccountAction[execute];org.springframework.samples.jpetstore.web.struts.SearchProductsAction[execute];org.springframework.samples.jpetstore.web.struts.ViewCartAction[execute];org.springframework.samples.jpetstore.web.struts.ViewCategoryAction[execute];org.springframework.samples.jpetstore.web.struts.ViewProductAction[execute];org.springframework.samples.jpetstore.web.struts.ViewItemAction[execute]
    volumes:
      - ./opentelemetry-javaagent.jar:/opt/otel-javaagent.jar:ro
    ports:
      - "8083:8080"
    networks:
      - apps
    depends_on:
      - otel-collector

  # ===================== PlantsByWebSphere =====================
  plantsbywebsphere:
    image: plantsbywebsphere:latest
    container_name: plantsbywebsphere
    user: root
    environment:
      - >-
        JAVA_TOOL_OPTIONS=
        -javaagent:/opt/otel-javaagent.jar
        -Dotel.service.name=plantsbywebsphere
        -Dotel.exporter.otlp.endpoint=http://otel-collector:4318
        -Dotel.exporter.otlp.protocol=http/protobuf
        -Dotel.traces.exporter=otlp
        -Dotel.logs.exporter=otlp
        -Dotel.metrics.exporter=none
        -Dotel.instrumentation.servlet.enabled=true
        -Dotel.instrumentation.servlet.experimental-span-attributes=true
        -Dotel.instrumentation.jaxrs.enabled=true
        -Dotel.propagators=tracecontext,baggage
        -Dotel.instrumentation.jdbc.enabled=false
    volumes:
      - ./opentelemetry-javaagent.jar:/opt/otel-javaagent.jar:ro
    ports:
      - "8084:9080"
    networks:
      - apps

volumes:
  acmeair_db_data:

networks:
  apps:
    driver: bridge
